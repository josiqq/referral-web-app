<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Exportar Logo 815x815</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1430;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      color: #fff;
      gap: 20px;
    }

    canvas {
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      background: #0b1430;
    }

    .controls {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ff7a00;
      color: #000;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <canvas id="canvas" width="815" height="815"></canvas>

  <div class="controls">
    <button onclick="exportPNG()">Descargar PNG</button>
    <button onclick="exportWEBP()">Descargar WebP</button>
  </div>

  <script>
    const SIZE = 815
    const BG_COLOR = "#0C1432"
    const IMAGE_SRC = "powerwater.png" // ← tu logo aquí

    const canvas = document.getElementById("canvas")
    const ctx = canvas.getContext("2d")

    const img = new Image()
    img.src = IMAGE_SRC

    img.onload = () => {
      draw()
    }

    function draw() {
      // fondo
      ctx.fillStyle = BG_COLOR
      ctx.fillRect(0, 0, SIZE, SIZE)

      // escalar manteniendo proporción
      const scale = Math.min(
        SIZE / img.width,
        SIZE / img.height
      )

      const w = img.width * scale
      const h = img.height * scale

      // centrar
      const x = (SIZE - w) / 2
      const y = (SIZE - h) / 2

      ctx.drawImage(img, x, y, w, h)
    }

    function download(dataUrl, filename) {
      const link = document.createElement("a")
      link.href = dataUrl
      link.download = filename
      link.click()
    }

    function exportPNG() {
      download(
        canvas.toDataURL("image/png"),
        "logo-815.png"
      )
    }

    function exportWEBP() {
      download(
        canvas.toDataURL("image/webp", 1),
        "logo-815.webp"
      )
    }
  </script>

</body>
</html>
